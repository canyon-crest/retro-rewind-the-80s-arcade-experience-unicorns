<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="favicon.png">
	<title>q5play</title>
	<style>
		html,
		body {
			    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #9d44e6;
    font-family: Arial, sans-serif;
    color: rgb(255, 186, 240);
  }
  h1 { margin: 10px; }
  #info { font-size: 14px; margin-bottom: 8px; }
  #score { font-size: 20px; margin-bottom: 10px; }
  canvas {
    background: rgb(255, 186, 240);       /* <-- change this for a solid background color */
    border: 2px solid #fff;
  }
</style>
</head>
<body>
  <h1>Twilight Sparkle Yummy</h1>
  <div id="info">Press your arrow keys to help Twilight Sparkle get magic</div>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>

<script>
	const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");

const GRID = 20;                   
const CELL = canvas.width / GRID;   
const useImages = false;

const snakeImg = new Image();
snakeImg.src = "snake.png";

const foodImg = new Image();
foodImg.src = "food.png";         // food sprite

const bgImg = new Image();
bgImg.src = "background.png";     //background image

let snake, dir, nextDir, food, score, gameOver;

function reset() {
  snake = [{ x: 10, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  food = spawnFood();
  score = 0;
  gameOver = false;
  scoreEl.textContent = "Score: 0";
}

function spawnFood() {
  while (true) {
    const f = {
      x: Math.floor(Math.random() * GRID),
      y: Math.floor(Math.random() * GRID)
    };
    if (!snake.some(s => s.x === f.x && s.y === f.y)) return f;
  }
}

// ---- Input ----
document.addEventListener("keydown", (e) => {
  if (gameOver) {
    if (e.code === "Space") reset();
    return;
  }
  if (e.key === "ArrowUp"    && dir.y !== 1)  nextDir = { x: 0,  y: -1 };
  if (e.key === "ArrowDown"  && dir.y !== -1) nextDir = { x: 0,  y: 1  };
  if (e.key === "ArrowLeft"  && dir.x !== 1)  nextDir = { x: -1, y: 0  };
  if (e.key === "ArrowRight" && dir.x !== -1) nextDir = { x: 1,  y: 0  };
});
function update() {
  if (gameOver) return;

  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    gameOver = true;
    return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver = true;
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = "Score: " + score;
    food = spawnFood();
  } else {
    snake.pop();
  }
}
function draw() {
  // Background
  if (useImages && bgImg.complete && bgImg.naturalWidth > 0) {
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = "#ddd";           // <-- change for canvas background color
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Food
  if (useImages && foodImg.complete && foodImg.naturalWidth > 0) {
    ctx.drawImage(foodImg, food.x * CELL, food.y * CELL, CELL, CELL);
  } else {
    ctx.fillStyle = "red";            // <-- food color
    ctx.fillRect(food.x * CELL, food.y * CELL, CELL, CELL);
  }

  // Snake
  for (const s of snake) {
    if (useImages && snakeImg.complete && snakeImg.naturalWidth > 0) {
      ctx.drawImage(snakeImg, s.x * CELL, s.y * CELL, CELL, CELL);
    } else {
      ctx.fillStyle = "green";        // <-- snake color
      ctx.fillRect(s.x * CELL, s.y * CELL, CELL, CELL);
    }
  }

  // Game over message
  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
    ctx.font = "16px Arial";
    ctx.fillText("Press SPACE to restart", canvas.width / 2, canvas.height / 2 + 20);
  }
}
function loop() {
  update();
  draw();
}
reset();
draw();
setInterval(loop, 100);   // lower number = faster snake
</script>
</body>
</html>
